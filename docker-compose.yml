services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    container_name: silabku_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-silabku}
      POSTGRES_USER: ${DB_USERNAME:-silabku}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - silabku_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-silabku} -d ${DB_DATABASE:-silabku}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel PHP-FPM Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        VITE_APP_URL: ${VITE_APP_URL}
    container_name: silabku_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      APP_STARTUP_ARTISAN_COMMAND: migrate:fresh --seed --force
    volumes:
      - ./:/var/www/html
      - ./docker/entrypoint.sh:/entrypoint.sh
      - ./docker/php-fpm/zz-socket.conf:/usr/local/etc/php-fpm.d/zz-socket.conf:ro
      - php_socket:/var/run/php
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/php/php-fpm.sock"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - silabku_net

  # ─── Nginx Web Server ──────────────────────────────────────────────────────
  web:
    image: nginx:alpine
    container_name: silabku_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
      - php_socket:/var/run/php
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - silabku_net

  # ─── Vite Dev Server ────────────────────────────────────────────────────────
  vite:
    image: node:22-alpine
    container_name: silabku_vite
    profiles:
      - dev
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - silabku_net

  # ─── Cloudflare Tunnel ─────────────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: silabku_cloudflared
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      TUNNEL_ID: ${CLOUDFLARE_TUNNEL_ID}
    depends_on:
      web:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - silabku_net

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  php_socket:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  silabku_net:
    driver: bridge
