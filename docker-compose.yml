services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    container_name: silabku_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-silabku}
      POSTGRES_USER: ${DB_USERNAME:-silabku}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - silabku_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-silabku} -d ${DB_DATABASE:-silabku}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel PHP-FPM Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        VITE_APP_URL: ${VITE_APP_URL}
    container_name: silabku_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - storage_data:/var/www/html/storage
      - public_data:/var/www/html/public-shared
    depends_on:
      db:
        condition: service_healthy
    networks:
      - silabku_net

  # ─── Nginx Web Server ──────────────────────────────────────────────────────
  web:
    image: nginx:alpine
    container_name: silabku_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - silabku_net

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  storage_data:
    driver: local
  public_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  silabku_net:
    driver: bridge
