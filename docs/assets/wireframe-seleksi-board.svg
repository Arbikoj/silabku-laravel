<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: none; stroke: #111827; stroke-width: 2; }
      .muted { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; }
      .title { font: 700 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .text { font: 400 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .btn { fill: #111827; }
      .btnText { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #ffffff; }
      .btn2 { fill: #ffffff; stroke: #111827; stroke-width: 1.5; }
      .btn2Text { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .pill { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>
  <rect class="frame" x="20" y="20" width="1160" height="780" rx="10"/>

  <!-- Header -->
  <rect class="muted" x="20" y="20" width="1160" height="64" rx="10"/>
  <text class="title" x="46" y="60">Silabku — Board Seleksi (Admin/Dosen)</text>

  <!-- Filter bar -->
  <rect class="box" x="20" y="94" width="1160" height="78" rx="10"/>
  <text class="label" x="46" y="124">Filter</text>
  <rect class="muted" x="46" y="134" width="260" height="26" rx="8"/>
  <text class="text" x="56" y="152">Event (dropdown)</text>
  <rect class="muted" x="320" y="134" width="220" height="26" rx="8"/>
  <text class="text" x="330" y="152">Status (all/pending/approved)</text>
  <rect class="muted" x="554" y="134" width="340" height="26" rx="8"/>
  <text class="text" x="564" y="152">Cari nama / NIM…</text>
  <rect class="btn2" x="910" y="130" width="120" height="32" rx="8"/>
  <text class="btn2Text" x="946" y="152">Terapkan</text>
  <rect class="btn2" x="1040" y="130" width="120" height="32" rx="8"/>
  <text class="btn2Text" x="1078" y="152">Reset</text>

  <!-- Group card -->
  <text class="label" x="20" y="210">Group: Algoritma dan Pemrograman — Kelas A</text>
  <rect class="box" x="20" y="224" width="1160" height="250" rx="10"/>
  <rect class="pill" x="46" y="244" width="330" height="26" rx="13"/>
  <text class="text" x="60" y="262">Kuota: 4 • Approved: 2 • Sisa: 2</text>
  <rect class="pill" x="390" y="244" width="260" height="26" rx="13"/>
  <text class="text" x="404" y="262">Dokumen: SPTJM + Transkrip</text>

  <!-- Candidate table header -->
  <rect class="muted" x="46" y="286" width="1088" height="34" rx="8"/>
  <text class="label" x="60" y="308">Kandidat</text>
  <text class="label" x="340" y="308">NIM</text>
  <text class="label" x="470" y="308">IPK</text>
  <text class="label" x="540" y="308">Nilai MK</text>
  <text class="label" x="660" y="308">Dokumen</text>
  <text class="label" x="840" y="308">Aksi</text>

  <!-- Row 1 -->
  <rect class="box" x="46" y="330" width="1088" height="44" rx="8"/>
  <text class="text" x="60" y="358">Nama Lengkap #1</text>
  <text class="text" x="340" y="358">2312345678</text>
  <text class="text" x="470" y="358">3.70</text>
  <text class="text" x="540" y="358">A</text>
  <text class="text" x="660" y="358">SPTJM ✓ • Transkrip ✓</text>
  <rect class="btn2" x="840" y="340" width="90" height="26" rx="8"/>
  <text class="btn2Text" x="860" y="358">Lihat</text>
  <rect class="btn" x="938" y="338" width="86" height="30" rx="8"/>
  <text class="btnText" x="956" y="358">Approve</text>
  <rect class="btn2" x="1030" y="338" width="86" height="30" rx="8"/>
  <text class="btn2Text" x="1048" y="358">Reject</text>

  <!-- Row 2 -->
  <rect class="box" x="46" y="380" width="1088" height="44" rx="8"/>
  <text class="text" x="60" y="408">Nama Lengkap #2</text>
  <text class="text" x="340" y="408">2312349999</text>
  <text class="text" x="470" y="408">3.40</text>
  <text class="text" x="540" y="408">AB</text>
  <text class="text" x="660" y="408">SPTJM ✓ • Transkrip ✓</text>
  <rect class="btn2" x="840" y="390" width="120" height="26" rx="8"/>
  <text class="btn2Text" x="858" y="408">Catatan</text>
  <rect class="btn2" x="970" y="390" width="146" height="26" rx="8"/>
  <text class="btn2Text" x="988" y="408">Switch/Replace</text>

  <!-- Notes -->
  <rect class="muted" x="20" y="494" width="1160" height="176" rx="10"/>
  <text class="label" x="46" y="524">Panel aksi lanjutan (opsional)</text>
  <text class="text" x="46" y="548">- Switch penugasan: tukar dua asisten yang sudah approved (dalam event yang sama).</text>
  <text class="text" x="46" y="570">- Replacement: ganti asisten approved dengan kandidat pending/rejected pada MK+Kelas yang sama.</text>
  <text class="text" x="46" y="592">- Seluruh aksi harus mematuhi kuota (ceil(jumlah_mhs/8)).</text>

  <!-- Footer -->
  <rect class="box" x="20" y="688" width="1160" height="112" rx="10"/>
  <text class="label" x="46" y="718">Output yang diharapkan</text>
  <text class="text" x="46" y="742">Status pilihan (pending/approved/rejected) tersinkron ke status aplikasi utama + reviewer + timestamp.</text>
</svg>

